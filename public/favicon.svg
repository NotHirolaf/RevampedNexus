<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 80 80">
  <style>
    .n { fill: #0f172a; }
    .e { stroke: #0f172a; stroke-opacity: 0.2; stroke-width: 1.2; }
    @media (prefers-color-scheme: dark) {
      .n { fill: #f8fafc; }
      .e { stroke: #f8fafc; }
    }
  </style>
  <!-- L1 → L2 -->
  <line class="e" x1="16" y1="28" x2="40" y2="18"/>
  <line class="e" x1="16" y1="28" x2="40" y2="40"/>
  <line class="e" x1="16" y1="28" x2="40" y2="62"/>
  <line class="e" x1="16" y1="52" x2="40" y2="18"/>
  <line class="e" x1="16" y1="52" x2="40" y2="40"/>
  <line class="e" x1="16" y1="52" x2="40" y2="62"/>
  <!-- L2 → L3 -->
  <line class="e" x1="40" y1="18" x2="64" y2="28"/>
  <line class="e" x1="40" y1="18" x2="64" y2="52"/>
  <line class="e" x1="40" y1="40" x2="64" y2="28"/>
  <line class="e" x1="40" y1="40" x2="64" y2="52"/>
  <line class="e" x1="40" y1="62" x2="64" y2="28"/>
  <line class="e" x1="40" y1="62" x2="64" y2="52"/>
  <!-- Layer 1 -->
  <circle class="n" cx="16" cy="28" r="5"/>
  <circle class="n" cx="16" cy="52" r="5"/>
  <!-- Layer 2 -->
  <circle class="n" cx="40" cy="18" r="5"/>
  <circle class="n" cx="40" cy="40" r="5"/>
  <circle class="n" cx="40" cy="62" r="5"/>
  <!-- Layer 3 -->
  <circle class="n" cx="64" cy="28" r="5"/>
  <circle class="n" cx="64" cy="52" r="5"/>
</svg>
